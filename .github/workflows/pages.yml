name: Pages Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          A1DEE3: ${{ secrets.A1DEE3 }}
          BF6988: ${{ secrets.BF6988 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A1DEE3', '')
          tag_b = os.environ.get('BF6988', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 0957e206cdc44ac064289a641897757ad8 -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- 4b1fb5a194cb53591302 -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
